<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Sheet Maker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #FAFAFA;
            padding: 10px;
            font-size: 12px;
            color: #2e2e2e;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border: 2px solid #2e2e2e;
            padding: 10px;
        }
        h1 {
            color: #7900A7;
            font-weight: bold;
            font-size: 12px;
            font-family: Georgia, serif;
            margin: 0;
            line-height: 14px;
        }
        h2 {
            color: #7900A7;
            font-weight: bold;
            font-size: 12px;
            font-family: Georgia, serif;
            margin: 10px 0 5px 0;
        }
        p {
            font-size: 12px;
            margin: 0 0 5px 0;
        }
        .controls {
            border: 1px solid #2e2e2e;
            padding: 5px;
            margin: 10px 0;
        }
        .control-row {
            margin: 3px 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        label {
            font-weight: bold;
            color: #2e2e2e;
            font-size: 12px;
            min-width: 120px;
        }
        select, input[type="number"], input[type="text"] {
            padding: 3px;
            border: 1px solid #2e2e2e;
            font-size: 12px;
            background: white;
        }
        select:focus, input:focus {
            outline: none;
        }
        input[type="color"] {
            height: 28px;
            width: 60px;
            border: 1px solid #2e2e2e;
            cursor: pointer;
            padding: 0;
        }
        .file-input-wrapper {
            border: 2px solid #2e2e2e;
            padding: 20px;
            margin: 10px 0;
            background: #f5f5f5;
            text-align: center;
        }
        .file-input-wrapper:hover {
            background: #efefef;
        }
        .file-input-wrapper input[type="file"] {
            display: none;
        }
        .file-input-label {
            cursor: pointer;
            font-size: 12px;
            color: #7900A7;
            text-decoration: underline;
        }
        .stats {
            border: 1px solid #2e2e2e;
            padding: 5px;
            margin: 10px 0;
            background: #f5f5f5;
        }
        .stat-row {
            margin: 2px 0;
            font-size: 12px;
        }
        .stat-label {
            font-weight: bold;
            color: #2e2e2e;
            display: inline-block;
            min-width: 100px;
        }
        .buttons {
            margin: 10px 0;
        }
        button {
            padding: 5px 10px;
            border: 2px solid #2e2e2e;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            background: white;
            color: #7900A7;
            margin: 2px 5px 2px 0;
        }
        button:hover {
            background: #7900A7;
            color: white;
        }
        button:disabled {
            opacity: 0.5;
            cursor: default;
            color: #999;
        }
        button:disabled:hover {
            background: white;
            color: #999;
        }
        .canvas-container {
            border: 2px solid #2e2e2e;
            background: white;
            max-height: 600px;
            overflow: auto;
            margin: 10px 0;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
        }
        .grid-inputs {
            display: inline-flex;
            gap: 5px;
        }
        .grid-inputs input {
            width: 80px;
        }
        .info-message {
            background: #ffffcc;
            border: 1px solid #2e2e2e;
            padding: 5px;
            margin: 10px 0;
            font-size: 12px;
        }
        a {
            color: #7900A7;
            font-size: 12px;
            text-decoration: none;
        }
        a:visited {
            color: #7900A7;
        }
        .small-text {
            font-size: 11px;
            color: #2e2e2e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Lou32 Sprite Sheet Assembly Utility</h1>
        <p>"A Novel Implementation Of The Lou32 Spritesheet Assembly Apparatus For The World Wide Web"</p>
        
        <h2>Controls</h2>
        <div class="controls">
            <div class="control-row">
                <label for="mode">Pack Mode:</label>
                <select id="mode">
                    <option value="grid">Grid</option>
                    <option value="vertical">Vertical</option>
                    <option value="horizontal">Horizontal</option>
                    <option value="bin">Best Fit</option>
                </select>
            </div>
            
            <div class="control-row" id="gridInputs" style="display: none;">
                <label>Grid Layout:</label>
                <div class="grid-inputs">
                    <input type="number" id="rows" placeholder="Rows" min="1">
                    <input type="number" id="columns" placeholder="Cols" min="1">
                </div>
            </div>
            
            <div class="control-row">
                <label for="padding">Padding (px):</label>
                <input type="number" id="padding" value="0" min="0" style="width: 80px;">
            </div>
            
            <div class="control-row">
                <label for="bgColor">Background:</label>
                <input type="color" id="bgColor" value="#000000">
                <label style="min-width: auto; margin-left: 10px;">
                    <input type="checkbox" id="transparent"> Transparent
                </label>
            </div>
        </div>
        
        <h2>Select Images</h2>
        <div class="file-input-wrapper">
            <label class="file-input-label" for="fileInput">
                <p><strong>[Click here to select images]</strong></p>
                <p class="small-text">or drag and drop files here</p>
                <p class="small-text">PNG, JPG, JPEG supported</p>
            </label>
            <input type="file" id="fileInput" multiple accept="image/png,image/jpeg,image/jpg">
        </div>
        
        <div id="info" class="info-message" style="display: none;">
            Select images to get started building your sprite sheet
        </div>
        
        <div class="stats" id="stats" style="display: none;">
            <div class="stat-row">
                <span class="stat-label">Images:</span>
                <span id="imageCount">0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Dimensions:</span>
                <span id="dimensions">0×0</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Est. Size:</span>
                <span id="fileSize">0 KB</span>
            </div>
        </div>
        
        <div class="buttons">
            <button id="downloadPng" disabled>[Download PNG]</button>
            <button id="downloadCss" disabled>[Download CSS]</button>
            <button id="downloadJson" disabled>[Download JSON]</button>
        </div>
        
        <h2>Preview</h2>
        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
    </div>

    <script>
        class SpriteSheetMaker {
            constructor() {
                this.images = [];
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.spriteData = [];
                
                this.initEventListeners();
                this.showInfo();
            }
            
            initEventListeners() {
                document.getElementById('fileInput').addEventListener('change', (e) => this.handleFiles(e.target.files));
                document.getElementById('mode').addEventListener('change', () => this.generate());
                document.getElementById('rows').addEventListener('input', () => this.generate());
                document.getElementById('columns').addEventListener('input', () => this.generate());
                document.getElementById('padding').addEventListener('input', () => this.generate());
                document.getElementById('bgColor').addEventListener('input', () => this.generate());
                document.getElementById('transparent').addEventListener('change', () => this.generate());
                document.getElementById('downloadPng').addEventListener('click', () => this.downloadPng());
                document.getElementById('downloadCss').addEventListener('click', () => this.downloadCss());
                document.getElementById('downloadJson').addEventListener('click', () => this.downloadJson());
                
                // Drag and drop
                const wrapper = document.querySelector('.file-input-wrapper');
                wrapper.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    wrapper.style.background = '#e5e5e5';
                });
                wrapper.addEventListener('dragleave', () => {
                    wrapper.style.background = '#f5f5f5';
                });
                wrapper.addEventListener('drop', (e) => {
                    e.preventDefault();
                    wrapper.style.background = '#f5f5f5';
                    this.handleFiles(e.dataTransfer.files);
                });
                
                // Show/hide grid inputs
                document.getElementById('mode').addEventListener('change', (e) => {
                    document.getElementById('gridInputs').style.display = 
                        e.target.value === 'grid' ? 'flex' : 'none';
                });
            }
            
            showInfo() {
                document.getElementById('info').style.display = 'block';
            }
            
            hideInfo() {
                document.getElementById('info').style.display = 'none';
            }
            
            async handleFiles(files) {
                const imageFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
                if (imageFiles.length === 0) return;
                
                this.hideInfo();
                this.images = [];
                
                for (const file of imageFiles) {
                    const img = await this.loadImage(file);
                    this.images.push({ img, name: file.name });
                }
                
                this.generate();
            }
            
            loadImage(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => resolve(img);
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }
            
            generate() {
                if (this.images.length === 0) return;
                
                const mode = document.getElementById('mode').value;
                const padding = parseInt(document.getElementById('padding').value) || 0;
                
                let layout;
                switch (mode) {
                    case 'vertical':
                        layout = this.layoutVertical(padding);
                        break;
                    case 'horizontal':
                        layout = this.layoutHorizontal(padding);
                        break;
                    case 'grid':
                        layout = this.layoutGrid(padding);
                        break;
                    case 'bin':
                        layout = this.layoutBinPack(padding);
                        break;
                }
                
                this.render(layout, padding);
                this.updateStats();
                this.enableButtons();
            }
            
            layoutVertical(padding) {
                const maxWidth = Math.max(...this.images.map(img => img.img.width));
                let y = padding;
                const sprites = [];
                
                for (let i = 0; i < this.images.length; i++) {
                    const img = this.images[i].img;
                    sprites.push({
                        x: padding,
                        y: y,
                        width: img.width,
                        height: img.height,
                        image: img,
                        name: this.images[i].name
                    });
                    y += img.height + padding;
                }
                
                return {
                    width: maxWidth + padding * 2,
                    height: y,
                    sprites
                };
            }
            
            layoutHorizontal(padding) {
                const maxHeight = Math.max(...this.images.map(img => img.img.height));
                let x = padding;
                const sprites = [];
                
                for (let i = 0; i < this.images.length; i++) {
                    const img = this.images[i].img;
                    sprites.push({
                        x: x,
                        y: padding,
                        width: img.width,
                        height: img.height,
                        image: img,
                        name: this.images[i].name
                    });
                    x += img.width + padding;
                }
                
                return {
                    width: x,
                    height: maxHeight + padding * 2,
                    sprites
                };
            }
            
            layoutGrid(padding) {
                let rows = parseInt(document.getElementById('rows').value);
                let cols = parseInt(document.getElementById('columns').value);
                
                if (!rows && !cols) {
                    cols = Math.ceil(Math.sqrt(this.images.length));
                    rows = Math.ceil(this.images.length / cols);
                } else if (!rows) {
                    rows = Math.ceil(this.images.length / cols);
                } else if (!cols) {
                    cols = Math.ceil(this.images.length / rows);
                }
                
                const cellWidth = Math.max(...this.images.map(img => img.img.width));
                const cellHeight = Math.max(...this.images.map(img => img.img.height));
                const sprites = [];
                
                for (let i = 0; i < this.images.length; i++) {
                    const row = Math.floor(i / cols);
                    const col = i % cols;
                    const img = this.images[i].img;
                    
                    sprites.push({
                        x: padding + col * (cellWidth + padding),
                        y: padding + row * (cellHeight + padding),
                        width: img.width,
                        height: img.height,
                        image: img,
                        name: this.images[i].name
                    });
                }
                
                return {
                    width: padding + cols * (cellWidth + padding),
                    height: padding + rows * (cellHeight + padding),
                    sprites
                };
            }
            
            layoutBinPack(padding) {
                const items = this.images.map((img, i) => ({
                    width: img.img.width + padding,
                    height: img.img.height + padding,
                    image: img.img,
                    name: img.name,
                    index: i
                })).sort((a, b) => b.height - a.height);
                
                const sprites = [];
                const shelves = [];
                let totalWidth = 0;
                let totalHeight = 0;
                
                for (const item of items) {
                    let placed = false;
                    
                    for (const shelf of shelves) {
                        if (shelf.remainingWidth >= item.width && shelf.height >= item.height) {
                            sprites.push({
                                x: shelf.x + shelf.usedWidth,
                                y: shelf.y,
                                width: item.image.width,
                                height: item.image.height,
                                image: item.image,
                                name: item.name
                            });
                            shelf.usedWidth += item.width;
                            shelf.remainingWidth -= item.width;
                            placed = true;
                            break;
                        }
                    }
                    
                    if (!placed) {
                        const newShelf = {
                            x: padding,
                            y: totalHeight + padding,
                            height: item.height,
                            usedWidth: item.width,
                            remainingWidth: 2048 - item.width - padding
                        };
                        shelves.push(newShelf);
                        
                        sprites.push({
                            x: newShelf.x,
                            y: newShelf.y,
                            width: item.image.width,
                            height: item.image.height,
                            image: item.image,
                            name: item.name
                        });
                        
                        totalHeight += item.height;
                        totalWidth = Math.max(totalWidth, newShelf.usedWidth + padding);
                    }
                }
                
                return {
                    width: totalWidth + padding,
                    height: totalHeight + padding * 2,
                    sprites
                };
            }
            
            render(layout, padding) {
                this.canvas.width = layout.width;
                this.canvas.height = layout.height;
                
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (!document.getElementById('transparent').checked) {
                    this.ctx.fillStyle = document.getElementById('bgColor').value;
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                }
                
                this.spriteData = [];
                for (const sprite of layout.sprites) {
                    this.ctx.drawImage(
                        sprite.image,
                        sprite.x,
                        sprite.y,
                        sprite.width,
                        sprite.height
                    );
                    
                    this.spriteData.push({
                        name: sprite.name.replace(/\.[^/.]+$/, ''),
                        x: sprite.x,
                        y: sprite.y,
                        width: sprite.width,
                        height: sprite.height
                    });
                }
            }
            
            updateStats() {
                document.getElementById('stats').style.display = 'block';
                document.getElementById('imageCount').textContent = this.images.length;
                document.getElementById('dimensions').textContent = 
                    `${this.canvas.width}×${this.canvas.height}`;
                
                const pixels = this.canvas.width * this.canvas.height;
                const estimatedSize = Math.round(pixels * 4 / 1024);
                document.getElementById('fileSize').textContent = 
                    estimatedSize < 1024 ? `${estimatedSize} KB` : `${(estimatedSize / 1024).toFixed(1)} MB`;
            }
            
            enableButtons() {
                document.getElementById('downloadPng').disabled = false;
                document.getElementById('downloadCss').disabled = false;
                document.getElementById('downloadJson').disabled = false;
            }
            
            downloadPng() {
                const link = document.createElement('a');
                link.download = 'spritesheet.png';
                link.href = this.canvas.toDataURL('image/png');
                link.click();
            }
            
            downloadCss() {
                let css = `.sprite {
  background-image: url('spritesheet.png');
  background-repeat: no-repeat;
  display: inline-block;
}\n\n`;
                
                for (const sprite of this.spriteData) {
                    const className = sprite.name.replace(/[^a-zA-Z0-9-_]/g, '-');
                    css += `.sprite-${className} {
  width: ${sprite.width}px;
  height: ${sprite.height}px;
  background-position: -${sprite.x}px -${sprite.y}px;
}\n\n`;
                }
                
                const blob = new Blob([css], { type: 'text/css' });
                const link = document.createElement('a');
                link.download = 'spritesheet.css';
                link.href = URL.createObjectURL(blob);
                link.click();
            }
            
            downloadJson() {
                const data = {
                    width: this.canvas.width,
                    height: this.canvas.height,
                    sprites: this.spriteData
                };
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const link = document.createElement('a');
                link.download = 'spritesheet.json';
                link.href = URL.createObjectURL(blob);
                link.click();
            }
        }
        
        new SpriteSheetMaker();
    </script>
</body>
</html>
