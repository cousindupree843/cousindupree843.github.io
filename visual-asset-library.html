<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Asset Library</title>
    <style>
        /* Your existing CSS styles */
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Visual Asset Library</h1>
            <p>Complete icon library viewer and documentation</p>
        </div>

        <!-- Add a dropdown to select icon size -->
        <div class="filters">
            <label for="iconSizeSelector">Select Icon Size:</label>
            <select id="iconSizeSelector">
                <option value="16x16">16x16</option>
                <option value="32x32">32x32</option>
                <option value="48x48">48x48</option>
                <option value="64x64">64x64</option>
            </select>
        </div>

        <div class="icon-grid" id="iconGrid">
            <!-- Icons will be populated dynamically -->
        </div>
    </div>

    <script>
        let iconData = null;

        // Fetch JSON data based on selected size
        async function loadIconData(size) {
            try {
                const filePath = `atlas/${size}/icon_set_${size}_atlas.json`;
                const response = await fetch(filePath);

                if (!response.ok) {
                    throw new Error(`Failed to load ${filePath}: ${response.status}`);
                }

                iconData = await response.json();
                renderIcons();
            } catch (error) {
                console.error("Error loading icon data:", error);
                document.getElementById("iconGrid").innerHTML = `<div class="error">Failed to load icons for ${size}. Please try again.</div>`;
            }
        }

        // Event listener for icon size selection
        document.getElementById("iconSizeSelector").addEventListener("change", (event) => {
            const selectedSize = event.target.value;
            loadIconData(selectedSize);
        });

        // Render icons in the grid
        function renderIcons() {
            const iconGrid = document.getElementById("iconGrid");
            iconGrid.innerHTML = ""; // Clear existing icons

            iconData.frames.forEach((icon) => {
                const iconCard = document.createElement("div");
                iconCard.className = "icon-card";

                iconCard.innerHTML = `
                    <div class="icon-preview" style="width: ${icon.w}px; height: ${icon.h}px;">
                        <img src="atlas/${iconData.meta.image}" 
                             style="object-position: -${icon.x}px -${icon.y}px; width: ${iconData.meta.size.w}px; height: ${iconData.meta.size.h}px;"
                             alt="${icon.name}">
                    </div>
                    <div class="icon-name">${icon.name}</div>
                `;

                iconGrid.appendChild(iconCard);
            });
        }

        // Load default size on page load
        document.addEventListener("DOMContentLoaded", () => {
            const defaultSize = "16x16";
            document.getElementById("iconSizeSelector").value = defaultSize;
            loadIconData(defaultSize);
        });
    </script>
</body>
</html>
